<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>ADMINISTRASI KEUANGAN Financial Health Checker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-app: #f6f9ff;
            --surface: #fff;
            --soft: #edf5ff;
            --text: #172033;
            --muted: #68758d;
            --border: #dce8f7;
            --blue: #2563eb;
            --blue2: #60a5fa;
            --green: #16a34a;
            --orange: #f59e0b;
            --red: #dc2626;
            --shadow-lg: 0 28px 80px rgba(0, 0, 0, .28)
        }

        * {
            box-sizing: border-box
        }

        html,
        body,
        #app {
            height: 100%
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 0, #24466f, #0f172a 42%, #050914);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
            overflow-x: hidden
        }

        button,
        input,
        select,
        textarea {
            font: inherit
        }

        button {
            border: 0;
            cursor: pointer
        }

        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .app-container {
            aspect-ratio: 10/21;
            height: min(915px, calc(100vh - 40px));
            max-width: 440px;
            background: var(--bg-app);
            box-shadow: var(--shadow-lg), 0 0 0 12px #1e293b;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        .app-notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background: #1e293b;
            border-radius: 15px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .app-notch:after {
            content: '';
            width: 12px;
            height: 12px;
            background: #0f172a;
            border-radius: 50%;
            margin-left: 50px
        }

        .phone-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 24px 0;
            height: 22px;
            background: var(--bg-app);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            pointer-events: none
        }

        .status-bar-time {
            font-size: .65rem;
            font-weight: 800;
            color: #64748b
        }

        .app-body {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-top: 24px
        }

        .screen {
            min-height: 100%;
            padding: 18px 18px 92px;
            background: linear-gradient(180deg, #f8fbff, #edf5ff)
        }

        .login {
            min-height: 100%;
            display: grid;
            align-content: center;
            gap: 18px;
            padding: 28px;
            background: linear-gradient(160deg, #f8fbff, #e7f0ff)
        }

        .brand {
            width: 70px;
            height: 70px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--blue), #22c55e);
            display: grid;
            place-items: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 16px 35px rgba(37, 99, 235, .28)
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(31, 69, 116, .08)
        }

        .hero {
            background: linear-gradient(135deg, #12316b, var(--blue) 58%, #8bc5ff);
            color: white;
            border-radius: 30px;
            padding: 22px;
            box-shadow: 0 16px 38px rgba(37, 99, 235, .22);
            position: relative;
            overflow: hidden
        }

        .hero h1 {
            font-size: 26px;
            line-height: 1.07;
            margin: 10px 0 8px
        }

        .hero p {
            font-size: 13px;
            line-height: 1.45;
            margin: 0;
            opacity: .9
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800
        }

        .value {
            font-size: 23px;
            font-weight: 950;
            margin-top: 4px
        }

        .top-row,
        .section-title,
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px
        }

        .top-row {
            margin-bottom: 14px
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(135deg, #eaf2ff, #bbf7d0);
            display: grid;
            place-items: center;
            font-weight: 950;
            color: #164073
        }

        .section-title {
            margin: 20px 2px 10px
        }

        .section-title h2 {
            font-size: 18px;
            margin: 0
        }

        .row {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 10px
        }

        .row strong {
            font-size: 14px
        }

        .btn {
            border-radius: 16px;
            background: var(--blue);
            color: white;
            padding: 12px 14px;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(37, 99, 235, .25);
            cursor: pointer
        }

        .btn.secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none
        }

        .btn.danger {
            background: #fff1f2;
            color: var(--red);
            box-shadow: none
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 10px
        }

        .field label {
            font-size: 12px;
            font-weight: 900;
            color: var(--muted)
        }

        .field input,
        .field select,
        .field textarea {
            border: 1px solid var(--border);
            background: white;
            border-radius: 16px;
            padding: 12px;
            outline: none;
            font-size: 14px
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12)
        }

        .status {
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 11px;
            font-weight: 900
        }

        .good {
            background: #dcfce7;
            color: #15803d
        }

        .warn {
            background: #fef3c7;
            color: #b45309
        }

        .bad {
            background: #fee2e2;
            color: #b91c1c
        }

        .income {
            color: var(--green)
        }

        .expense {
            color: var(--red)
        }

        .nav {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 14px;
            background: rgba(255, 255, 255, .94);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            box-shadow: 0 15px 35px rgba(31, 69, 116, .16);
            z-index: 50
        }

        .nav button {
            background: transparent;
            border-radius: 18px;
            padding: 9px 3px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px
        }

        .nav button.active {
            background: #eaf2ff;
            color: var(--blue)
        }

        .icon {
            font-size: 18px
        }

        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .logout-btn {
            background: #fee2e2;
            color: var(--red);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900
        }

        .logout-btn:hover {
            background: #fecaca
        }

        .read-only-badge {
            background: #fef3c7;
            color: #b45309;
            padding: 6px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 10px
        }

        @media(max-width:500px) {
            body {
                background: var(--bg-app)
            }

            #app {
                min-height: 100dvh;
                align-items: flex-start;
                justify-content: flex-start
            }

            .app-container {
                max-width: 100% !important;
                width: 100% !important;
                height: 100dvh !important;
                aspect-ratio: unset !important;
                border-radius: 0 !important;
                box-shadow: none !important
            }

            .app-notch,
            .phone-status-bar {
                display: none !important
            }

            .app-body {
                padding-top: 8px !important
            }

            .nav {
                position: fixed
            }

            .screen {
                min-height: 100dvh
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="app-container">
            <div class="app-notch"></div>
            <div class="phone-status-bar"><span class="status-bar-time" id="clock"></span></div>
            <main class="app-body" id="body"></main>
        </div>
    </div>
    <script>
const DB_KEY = 'administrasi_keuangan_v3';
let SQL, db, session = null, active = 'login', users = [], transactions = [], categories = [];

async function initDB() {
    return new Promise(async resolve => {
        const script = document.createElement('script');
        script.src = 'https://sql.js.org/dist/sql-wasm.js';
        script.onload = async () => {
            const SQL = window.SQL;
            const dbPath = 'https://sql.js.org/dist/sql-wasm.wasm';
            SQL.Database.create({wasmBinary: null}).then(sqlJs => {
                SQL = sqlJs;
                let savedData = localStorage.getItem(DB_KEY);
                if (savedData) {
                    db = new SQL.Database(new Uint8Array(JSON.parse(savedData)));
                } else {
                    db = new SQL.Database();
                    initSchema();
                }
                loadData();
                render();
                renderNav();
                resolve();
            });
        };
        document.head.appendChild(script);
    });
}

function initSchema() {
    db.run('CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, email TEXT UNIQUE, password TEXT, role TEXT, region TEXT)');
    db.run('CREATE TABLE transactions (id INTEGER PRIMARY KEY, type TEXT, amount REAL, description TEXT, category TEXT, transaction_date TEXT, created_by INTEGER, created_at TEXT)');
    db.run('CREATE TABLE categories (id INTEGER PRIMARY KEY, name TEXT, type TEXT)');

    const demoUsers = [
        ['admin@umkmcoach.id', 'admin123', 'Admin', 'admin', 'Jakarta'],
        ['umkm@umkmcoach.id', 'pt123', 'PT Owner', 'owner', 'Surabaya'],
        ['pendamping@umkmcoach.id', 'damping123', 'Pendamping', 'mentor', 'Jakarta'],
        ['akuntan@umkmcoach.id', 'akuntan123', 'Akuntan', 'accountant', 'Jakarta'],
        ['manajer@umkmcoach.id', 'manajer123', 'Manajer', 'manager', 'Jakarta']
    ];

    demoUsers.forEach(u => {
        db.run('INSERT INTO users (email, password, name, role, region) VALUES (?, ?, ?, ?, ?)', u);
    });

    const catData = [
        ['Penjualan', 'income'],
        ['Jasa', 'income'],
        ['Lainnya', 'income'],
        ['Gaji', 'expense'],
        ['Sewa', 'expense'],
        ['Utilitas', 'expense'],
        ['Bahan Baku', 'expense'],
        ['Transport', 'expense']
    ];

    catData.forEach(c => {
        db.run('INSERT INTO categories (name, type) VALUES (?, ?)', c);
    });

    saveDB();
}

function saveDB() {
    const data = db.export();
    localStorage.setItem(DB_KEY, JSON.stringify(Array.from(data)));
}

function show(screen) {
    active = screen;
    location.hash = '#/' + screen;
    render();
}

function login(email, password) {
    try {
        const result = db.exec('SELECT * FROM users WHERE email = ? AND password = ?', [email, password]);
        if (result.length > 0 && result[0].length > 0) {
            const user = result[0][0];
            session = {id: user[0], name: user[1], email: user[2], role: user[4], region: user[5]};
            localStorage.setItem('session', JSON.stringify(session));
            show('dashboard');
        } else {
            alert('Email atau password salah');
        }
    } catch (e) {
        alert('Error login: ' + e.message);
    }
}

function logout() {
    if (confirm('Yakin ingin logout?')) {
        session = null;
        localStorage.removeItem('session');
        show('login');
    }
}

function getStatusBadge(score) {
    if (score >= 80) return {text: 'Sangat Sehat', class: 'good'};
    if (score >= 60) return {text: 'Sehat', class: 'good'};
    if (score >= 40) return {text: 'Cukup', class: 'warn'};
    return {text: 'Perlu Perbaikan', class: 'bad'};
}

function getRoleDisplay() {
    const map = {'admin': 'Administrator', 'owner': 'Pemilik PT', 'mentor': 'Pendamping PT', 'accountant': 'Akuntan', 'manager': 'Manajer'};
    return map[session.role] || session.role;
}

function loadData() {
    const sessData = localStorage.getItem('session');
    if (sessData) session = JSON.parse(sessData);
    else if (active !== 'login') show('login');

    try {
        const transRes = db.exec('SELECT * FROM transactions');
        transactions = transRes.length > 0 ? transRes[0] : [];
        
        const catRes = db.exec('SELECT * FROM categories');
        categories = catRes.length > 0 ? catRes[0] : [];
    } catch (e) {
        console.log('Load data error:', e);
    }
}

function render() {
    const body = document.getElementById('body');
    if (!body) return;
    body.innerHTML = '';

    if (!session && active !== 'login') {
        show('login');
        return;
    }

    const screens = {
        login: screenLogin,
        dashboard: screenDashboard,
        transactions: screenTransactions,
        add_transaction: screenAddTransaction,
        profile: screenProfile
    };

    const screen = screens[active] || screenLogin;
    body.appendChild(screen());
}

function screenLogin() {
    const div = document.createElement('div');
    div.className = 'login';
    div.innerHTML = `
        <div class="brand">💰</div>
        <h1 style="font-size: 24px; margin: 0;">Login</h1>
        <p class="muted">Masukkan kredensial Anda</p>
        
        <div class="field">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="email@example.com">
        </div>
        
        <div class="field">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••">
        </div>
        
        <button class="btn" onclick="handleLogin()">Login</button>
        
        <div style="background: #eaf2ff; padding: 12px; border-radius: 12px; font-size: 12px;">
            <p style="margin: 0 0 8px; font-weight: 900; color: #2563eb;">🔐 Demo Accounts:</p>
            <p style="margin: 0 0 4px;"><strong>Admin:</strong> admin@umkmcoach.id / admin123</p>
            <p style="margin: 0 0 4px;"><strong>Owner:</strong> umkm@umkmcoach.id / pt123</p>
            <p style="margin: 0 0 4px;"><strong>Pendamping:</strong> pendamping@umkmcoach.id / damping123</p>
            <p style="margin: 0 0 4px;"><strong>Akuntan:</strong> akuntan@umkmcoach.id / akuntan123</p>
            <p style="margin: 0;"><strong>Manajer:</strong> manajer@umkmcoach.id / manajer123</p>
        </div>
    `;
    return div;
}

function handleLogin() {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    if (email && password) login(email, password);
    else alert('Email dan password harus diisi');
}

function screenDashboard() {
    const div = document.createElement('div');
    div.className = 'screen';

    const header = document.createElement('div');
    header.className = 'header-with-logout';
    header.innerHTML = `
        <div>
            <h2 style="margin: 0; font-size: 20px;">Dashboard</h2>
            <p class="muted" style="margin: 4px 0 0;">${getRoleDisplay()}</p>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    `;
    div.appendChild(header);

    if (session.role === 'owner') {
        div.innerHTML += `
            <div class="read-only-badge">📊 Mode Monitoring (Read-Only)</div>
            <p class="muted">Anda hanya bisa memantau. Hubungi Akuntan untuk input transaksi.</p>
        `;
    }

    const score = 75;
    const badge = getStatusBadge(score);
    
    div.innerHTML += `
        <div class="hero">
            <div>💰</div>
            <h1>Skor Kesehatan</h1>
            <p>Kesehatan keuangan bisnis Anda</p>
        </div>
        
        <div class="grid" style="margin-top: 16px;">
            <div class="card">
                <div class="label">Score</div>
                <div class="value">${score}</div>
                <span class="status ${badge.class}">${badge.text}</span>
            </div>
            <div class="card">
                <div class="label">Target Bulanan</div>
                <div class="value">Rp50jt</div>
            </div>
        </div>
    `;

    if (transactions.length > 0) {
        div.innerHTML += `<div class="section-title"><h2>Transaksi Terbaru</h2></div>`;
        transactions.slice(-3).reverse().forEach(t => {
            const typeClass = t[1] === 'income' ? 'income' : 'expense';
            div.innerHTML += `
                <div class="row">
                    <div>
                        <strong>${t[3]}</strong>
                        <br><span class="muted">${t[4]}</span>
                    </div>
                    <span class="${typeClass}">Rp${t[2].toLocaleString()}</span>
                </div>
            `;
        });
    }

    if (session.role === 'accountant') {
        div.innerHTML += `
            <div style="margin-top: 20px;">
                <button class="btn" onclick="show('add_transaction')" style="width: 100%;">
                    ➕ Tambah Transaksi
                </button>
            </div>
        `;
    }

    return div;
}

function screenTransactions() {
    const div = document.createElement('div');
    div.className = 'screen';

    div.innerHTML = `
        <div class="header-with-logout">
            <h2 style="margin: 0; font-size: 20px;">Riwayat Transaksi</h2>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    `;

    if (transactions.length === 0) {
        div.innerHTML += `<p class="muted">Belum ada transaksi</p>`;
    } else {
        transactions.forEach(t => {
            const typeClass = t[1] === 'income' ? 'income' : 'expense';
            div.innerHTML += `
                <div class="row">
                    <div>
                        <strong>${t[3]}</strong>
                        <br><span class="muted">${t[4]}</span>
                    </div>
                    <span class="${typeClass}">Rp${t[2].toLocaleString()}</span>
                </div>
            `;
        });
    }

    if (session.role === 'accountant') {
        div.innerHTML += `
            <div style="margin-top: 20px;">
                <button class="btn" onclick="show('add_transaction')" style="width: 100%;">
                    ➕ Tambah Transaksi
                </button>
            </div>
        `;
    }

    return div;
}

function screenAddTransaction() {
    const div = document.createElement('div');
    div.className = 'screen';

    if (session.role !== 'accountant') {
        div.innerHTML = `<p class="muted">Anda tidak memiliki akses</p>`;
        return div;
    }

    div.innerHTML = `
        <h2 style="margin: 0 0 14px; font-size: 20px;">Tambah Transaksi</h2>
        
        <div class="field">
            <label>Tipe</label>
            <select id="typeSelect">
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
            </select>
        </div>
        
        <div class="field">
            <label>Kategori</label>
            <select id="categorySelect">
                ${categories.map(c => `<option value="${c[1]}">${c[1]}</option>`).join('')}
            </select>
        </div>
        
        <div class="field">
            <label>Jumlah (Rp)</label>
            <input type="number" id="amountInput" placeholder="0" min="0">
        </div>
        
        <div class="field">
            <label>Deskripsi</label>
            <textarea id="descInput" placeholder="Catatan transaksi..."></textarea>
        </div>
        
        <button class="btn" onclick="handleAddTransaction()" style="width: 100%;">Simpan</button>
        <button class="btn secondary" onclick="show('dashboard')" style="width: 100%; margin-top: 10px;">Batal</button>
    `;
    return div;
}

function handleAddTransaction() {
    if (session.role !== 'accountant') {
        alert('Akses ditolak');
        return;
    }

    const type = document.getElementById('typeSelect').value;
    const cat = document.getElementById('categorySelect').value;
    const amount = parseFloat(document.getElementById('amountInput').value);
    const desc = document.getElementById('descInput').value;

    if (!amount || amount <= 0) {
        alert('Jumlah harus > 0');
        return;
    }

    try {
        db.run(
            'INSERT INTO transactions (type, amount, description, category, transaction_date, created_by, created_at) VALUES (?, ?, ?, ?, ?, ?, ?)',
            [type, amount, desc, cat, new Date().toLocaleDateString('id-ID'), session.id, new Date().toISOString()]
        );
        saveDB();
        alert('Transaksi berhasil ditambahkan');
        loadData();
        show('transactions');
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

function screenProfile() {
    const div = document.createElement('div');
    div.className = 'screen';

    div.innerHTML = `
        <div class="header-with-logout">
            <h2 style="margin: 0; font-size: 20px;">Profil</h2>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
        
        <div class="card">
            <div class="avatar" style="width: 60px; height: 60px; font-size: 28px; margin-bottom: 12px;">
                ${session.name.charAt(0).toUpperCase()}
            </div>
            <strong style="font-size: 18px;">${session.name}</strong>
            <p class="muted">${session.email}</p>
            
            <div class="row" style="margin-top: 14px;">
                <span>Role:</span>
                <strong>${getRoleDisplay()}</strong>
            </div>

            <div class="row">
                <span>Wilayah:</span>
                <strong>${session.region}</strong>
            </div>
            
            <button class="btn danger" onclick="logout()" style="width: 100%; margin-top: 14px;">🚪 Logout</button>
        </div>
    `;

    return div;
}

function renderNav() {
    const body = document.getElementById('body');
    if (!body || !body.parentElement) return;
    
    const container = body.parentElement;
    const oldNav = container.querySelector('.nav');
    if (oldNav) oldNav.remove();

    if (!session) return;

    const nav = document.createElement('nav');
    nav.className = 'nav';

    const items = [
        {name: 'Dashboard', icon: '📊', screen: 'dashboard'},
        {name: 'Transaksi', icon: '📝', screen: 'transactions'},
        {name: 'Profil', icon: '👤', screen: 'profile'}
    ];

    items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = active === item.screen ? 'active' : '';
        btn.onclick = () => show(item.screen);
        btn.innerHTML = `<span class="icon">${item.icon}</span><span>${item.name}</span>`;
        nav.appendChild(btn);
    });

    container.appendChild(nav);
}

document.addEventListener('DOMContentLoaded', async () => {
    const clock = document.getElementById('clock');
    if (clock) {
        clock.textContent = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'});
        setInterval(() => {
            clock.textContent = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'});
        }, 1000);
    }

    try {
        await initDB();
    } catch (e) {
        console.error('Init error:', e);
    }

    window.addEventListener('hashchange', () => {
        active = location.hash.replace('#/', '') || 'dashboard';
        render();
        renderNav();
    });
});
    </script>
</body>

</html>
