<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">

    <style>
        :root {
            --bg-app: #f6f9ff;
            --surface: #fff;
            --soft: #edf5ff;
            --text: #172033;
            --muted: #68758d;
            --border: #dce8f7;
            --blue: #2563eb;
            --blue2: #60a5fa;
            --green: #16a34a;
            --orange: #f59e0b;
            --red: #dc2626;
            --shadow-lg: 0 28px 80px rgba(0, 0, 0, .28)
        }

        * {
            box-sizing: border-box
        }

        html,
        body,
        #app {
            height: 100%
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 0, #24466f, #0f172a 42%, #050914);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
            overflow-x: hidden
        }

        button,
        input,
        select,
        textarea {
            font: inherit
        }

        button {
            border: 0;
            cursor: pointer
        }

        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .app-container {
            aspect-ratio: 10/21;
            height: min(915px, calc(100vh - 40px));
            max-width: 440px;
            background: var(--bg-app);
            box-shadow: var(--shadow-lg), 0 0 0 12px #1e293b;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column

        .app-notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background: #1e293b;
            border-radius: 15px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .app-notch:after {
            content: '';
            width: 12px;
            height: 12px;
            background: #0f172a;
            border-radius: 50%;
            margin-left: 50px
        }

        .phone-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 24px 0;
            height: 22px;
            background: var(--bg-app);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            pointer-events: none
        }

        .status-bar-time {
            font-size: .65rem;
            font-weight: 800;
            color: #64748b
        }

        .app-body {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-top: 24px
        }

        .screen {

            background: linear-gradient(180deg, #f8fbff, #edf5ff)
        }

        .login {
            min-height: 100%;
            display: grid;
            align-content: center;
            gap: 18px;
            padding: 28px;
            background: linear-gradient(160deg, #f8fbff, #e7f0ff)
        }

        .brand {
            width: 70px;
            height: 70px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--blue), #22c55e);
            display: grid;
            place-items: center;

            font-size: 30px;
            box-shadow: 0 16px 35px rgba(37, 99, 235, .28)
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: .13em;
            text-transform: uppercase;
            font-weight: 900;
            color: var(--blue);

        }

        .muted {
            color: var(--muted);
            font-size: 12px;

        }

        .card {
            background: rgba(255, 255, 255, .92);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(31, 69, 116, .08)
        }

        .hero {
            background: linear-gradient(135deg, #12316b, var(--blue) 58%, #8bc5ff);
            color: white;
            border-radius: 30px;
            padding: 22px;
            box-shadow: 0 16px 38px rgba(37, 99, 235, .22);
            position: relative;
            overflow: hidden
        }

        .hero:after {
            content: '';
            position: absolute;
            right: -60px;
            top: -55px;
            width: 165px;
            height: 165px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .18)
        }

        .hero h1 {
            font-size: 26px;
            line-height: 1.07;
            margin: 10px 0 8px
        }

        .hero p {
            font-size: 13px;
            line-height: 1.45;
            margin: 0;
            opacity: .9
        }

        .chip {
            display: inline-flex;
            border-radius: 999px;
            padding: 7px 10px;
            background: #eaf2ff;
            color: #1d4ed8;
            font-size: 11px;
            font-weight: 900
        }

        .hero .chip {
            background: rgba(255, 255, 255, .18);
            color: #fff
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800
        }

        .value {
            font-size: 23px;
            font-weight: 950;
            margin-top: 4px
        }

        .top-row,
        .section-title,
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px
        }

        .top-row {
            margin-bottom: 14px
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(135deg, #eaf2ff, #bbf7d0);
            display: grid;
            place-items: center;
            font-weight: 950;
            color: #164073
        }

        .section-title {
            margin: 20px 2px 10px
        }

        .section-title h2 {
            font-size: 18px;
            margin: 0
        }

        .row {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 10px
        }

        .row strong {
            font-size: 14px
        }

        .btn {
            border-radius: 16px;
            background: var(--blue);
            color: white;
            padding: 12px 14px;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(37, 99, 235, .25)
        }

        .btn.secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none
        }

        .btn.danger {
            background: #fff1f2;
            color: var(--red);
            box-shadow: none
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 10px
        }

        .field label {
            font-size: 12px;
            font-weight: 900;
            color: var(--muted)
        }

        .field input,
        .field select,
        .field textarea {
            border: 1px solid var(--border);
            background: white;
            border-radius: 16px;
            padding: 12px;
            outline: none
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12)
        }

        .status {
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 11px;
            font-weight: 900
        }

        .good {
            background: #dcfce7;
            color: #15803d
        }

        .warn {
            background: #fef3c7;
            color: #b45309
        }

        .bad {
            background: #fee2e2;
            color: #b91c1c
        }

        .income {
            color: var(--green)
        }

        .expense {
            color: var(--red)
        }

        .nav {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 14px;
            background: rgba(255, 255, 255, .94);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            box-shadow: 0 15px 35px rgba(31, 69, 116, .16);
            z-index: 50
        }

        .nav button {
            background: transparent;
            border-radius: 18px;
            padding: 9px 3px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px
        }

        .nav button.active {
            background: #eaf2ff;
            color: var(--blue)
        }

        .icon {
            font-size: 18px
        }

        .toast {
            position: absolute;
            top: 54px;
            left: 18px;
            right: 18px;
            z-index: 1001;
            background: #0f1b33;
            color: white;
            border-radius: 18px;
            padding: 12px 14px;
            font-size: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .24)
        }

        .photo {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            object-fit: cover;
            background: #eef5ff
        }

        .analysis {
            font-size: 12px;
            line-height: 1.55;
            color: var(--muted)
        }

        .analysis b {
            color: var(--text)
        }

        .progress {
            height: 10px;
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden
        }

        .bar {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            border-radius: 999px
        }

        .header-with-logout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .logout-btn {
            background: #fee2e2;
            color: var(--red);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
        }

        .logout-btn:hover {
            background: #fecaca;
        }

        .read-only-badge {
            background: #fef3c7;
            color: #b45309;
            padding: 6px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 10px;
        }

        @media(max-width:500px) {
            body {
                background: var(--bg-app)
            }

            #app {
                min-height: 100dvh;
                align-items: flex-start;
                justify-content: flex-start
            }

            .app-container {
                max-width: 100% !important;
                width: 100% !important;
                height: 100dvh !important;
                aspect-ratio: unset !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                padding-top: env(safe-area-inset-top, 0)
            }

            .app-notch,
            .phone-status-bar {
                display: none !important
            }

            .app-body {
                padding-top: 8px !important
            }

            .nav {
                position: fixed
            }

            .screen {
                min-height: 100dvh
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="app-container">
            <div class="app-notch"></div>
            <div class="phone-status-bar"><span class="status-bar-time" id="clock"></span></div>
            <main class="app-body" id="body"></main>
        </div>
    </div>
    <script>
const DB_KEY = 'administrasi_keuangan_sqlite_v1';
let SQL, db, session = null, active = location.hash.replace('#/', '') || 'dashboard', users = [], businesses = [], transactions = [], healthScores = [], mentorNotes = [], categories = [];

// ==================== INISIALISASI DATABASE ====================
async function initDB() {
    SQL = window.SQL;
    const savedData = localStorage.getItem(DB_KEY);
    db = new SQL.Database(savedData ? new Uint8Array(JSON.parse(savedData)) : undefined);

    if (!savedData) initSchema();
}

function initSchema() {
    const queries = [
        `CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY, name TEXT, email TEXT UNIQUE, password TEXT, role TEXT, region TEXT)`,
        `CREATE TABLE IF NOT EXISTS businesses (id INTEGER PRIMARY KEY, owner_id INTEGER, name TEXT, monthly_target REAL, initial_score REAL, status TEXT, mentor_id INTEGER)`,
        `CREATE TABLE IF NOT EXISTS transactions (id INTEGER PRIMARY KEY, business_id INTEGER, type TEXT, category_id INTEGER, amount REAL, description TEXT, transaction_date TEXT, receipt_base64 TEXT, created_by INTEGER, created_at TEXT)`,
        `CREATE TABLE IF NOT EXISTS health_scores (id INTEGER PRIMARY KEY, business_id INTEGER, score REAL, status TEXT, recommendation TEXT, created_at TEXT)`,
        `CREATE TABLE IF NOT EXISTS mentor_notes (id INTEGER PRIMARY KEY, business_id INTEGER, mentor_id INTEGER, note TEXT, created_at TEXT)`,
        `CREATE TABLE IF NOT EXISTS categories (id INTEGER PRIMARY KEY, name TEXT, type TEXT)`
    ];

    queries.forEach(q => db.run(q));

    // Insert demo data
    const demoUsers = [
        ['admin@umkmcoach.id', 'admin123', 'Admin', 'admin', 'Jakarta'],
        ['umkm@umkmcoach.id', 'pt123', 'PT Owner', 'owner', 'Surabaya'],
        ['pendamping@umkmcoach.id', 'damping123', 'Pendamping', 'mentor', 'Jakarta'],
        ['akuntan@umkmcoach.id', 'akuntan123', 'Akuntan', 'accountant', 'Jakarta'],
        ['manajer@umkmcoach.id', 'manajer123', 'Manajer', 'manager', 'Jakarta']
    ];

    demoUsers.forEach(u => {
        db.run(`INSERT INTO users (email, password, name, role, region) VALUES (?, ?, ?, ?, ?)`, u);
    });

    const categories_data = [
        ['Penjualan', 'income'],
        ['Jasa', 'income'],
        ['Lainnya', 'income'],
        ['Gaji', 'expense'],
        ['Sewa', 'expense'],
        ['Utilitas', 'expense'],
        ['Bahan Baku', 'expense'],
        ['Transport', 'expense']
    ];

    categories_data.forEach(c => {
        db.run(`INSERT INTO categories (name, type) VALUES (?, ?)`, c);
    });

    saveDB();
}

function saveDB() {
    const data = db.export();
    const arr = Array.from(data);
    localStorage.setItem(DB_KEY, JSON.stringify(arr));
}

// ==================== UTILITY FUNCTIONS ====================
function show(screen) {
    active = screen;
    location.hash = '#/' + screen;
    render();
}

function login(email, password) {
    const result = db.exec(`SELECT * FROM users WHERE email = ? AND password = ?`, [email, password]);
    if (result.length > 0) {
        session = { id: result[0][0], name: result[0][1], email: result[0][2], role: result[0][4], region: result[0][5] };
        localStorage.setItem('session', JSON.stringify(session));
        show('dashboard');
    } else {
        alert('Email atau password salah');
    }
}

function logout() {
    if (confirm('Yakin ingin logout?')) {
        session = null;
        localStorage.removeItem('session');
        show('login');
    }
}

function getStatusBadge(score) {
    if (score >= 80) return { text: 'Sangat Sehat', class: 'good' };
    if (score >= 60) return { text: 'Sehat', class: 'good' };
    if (score >= 40) return { text: 'Cukup', class: 'warn' };
    return { text: 'Perlu Perbaikan', class: 'bad' };
}

// ==================== LOAD DATA ====================
function loadData() {
    const sessData = localStorage.getItem('session');
    if (sessData) session = JSON.parse(sessData);
    else if (active !== 'login') show('login');

    const usersRes = db.exec(`SELECT * FROM users`);
    users = usersRes.length > 0 ? usersRes[0] : [];

    const bizRes = db.exec(`SELECT * FROM businesses`);
    businesses = bizRes.length > 0 ? bizRes[0] : [];

    const transRes = db.exec(`SELECT * FROM transactions`);
    transactions = transRes.length > 0 ? transRes[0] : [];

    const catRes = db.exec(`SELECT * FROM categories`);
    categories = catRes.length > 0 ? catRes[0] : [];
}

// ==================== RENDERING ====================
function render() {
    const body = document.getElementById('body');
    body.innerHTML = '';

    if (!session && active !== 'login') {
        show('login');
        return;
    }

    const screenMap = {
        login: screenLogin,
        dashboard: screenDashboard,
        transactions: screenTransactions,
        add_transaction: screenAddTransaction,
        profile: screenProfile
    };

    const screen = screenMap[active] || screenLogin;
    body.appendChild(screen());
}

function screenLogin() {
    const div = document.createElement('div');
    div.className = 'login';
    div.innerHTML = `
        <div class="brand">💰</div>
        <h1 style="font-size: 24px; margin: 0;">Login</h1>
        <p class="muted">Masukkan kredensial Anda</p>
        
        <div class="field">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="email@example.com">
        </div>
        
        <div class="field">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••">
        </div>
        
        <button class="btn" onclick="handleLogin()">Login</button>
        
        <div style="background: #eaf2ff; padding: 12px; border-radius: 12px; font-size: 12px;">
            <p style="margin: 0 0 8px; font-weight: 900; color: #2563eb;">Demo Accounts:</p>
            <p style="margin: 0 0 4px;"><strong>Owner:</strong> umkm@umkmcoach.id / pt123</p>
            <p style="margin: 0 0 4px;"><strong>Akuntan:</strong> akuntan@umkmcoach.id / akuntan123</p>
            <p style="margin: 0;"><strong>Mentor:</strong> pendamping@umkmcoach.id / damping123</p>
        </div>
    `;
    return div;
}

function handleLogin() {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    login(email, password);
}

function screenDashboard() {
    const div = document.createElement('div');
    div.className = 'screen';

    const header = document.createElement('div');
    header.className = 'header-with-logout';
    header.innerHTML = `
        <div>
            <h2 style="margin: 0; font-size: 20px;">Dashboard</h2>
            <p class="muted" style="margin: 4px 0 0;">Halo, ${session.name}</p>
        </div>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    `;
    div.appendChild(header);

    if (session.role === 'owner') {
        div.innerHTML += `
            <div class="read-only-badge">📊 Mode Monitoring (Read-Only)</div>
            <p class="muted">Anda hanya bisa memantau keuangan. Untuk menginput transaksi, hubungi Akuntan.</p>
        `;
    }

    const heroScore = 75;
    const scoreStatus = getStatusBadge(heroScore);
    
    div.innerHTML += `
        <div class="hero">
            <div>💰</div>
            <h1>Skor Kesehatan</h1>
            <p>Kesehatan keuangan bisnis Anda</p>
        </div>
        
        <div class="grid" style="margin-top: 16px;">
            <div class="card">
                <div class="label">Score</div>
                <div class="value">${heroScore}</div>
                <span class="status ${scoreStatus.class}">${scoreStatus.text}</span>
            </div>
            <div class="card">
                <div class="label">Target Bulanan</div>
                <div class="value">Rp50jt</div>
            </div>
        </div>
    `;

    // Transaksi terbaru
    const recentTransactions = transactions.slice(-3).reverse();
    if (recentTransactions.length > 0) {
        div.innerHTML += `<div class="section-title"><h2>Transaksi Terbaru</h2></div>`;
        recentTransactions.forEach(t => {
            const type = t[2] === 'income' ? 'Masuk' : 'Keluar';
            const typeClass = t[2] === 'income' ? 'income' : 'expense';
            div.innerHTML += `
                <div class="row">
                    <div>
                        <strong>${t[5]}</strong>
                        <br><span class="muted">${t[6]}</span>
                    </div>
                    <span class="${typeClass}">Rp${t[4].toLocaleString()}</span>
                </div>
            `;
        });
    }

    // Tombol navigasi berdasarkan role
    if (session.role === 'accountant') {
        div.innerHTML += `
            <div style="margin-top: 20px;">
                <button class="btn" onclick="show('add_transaction')" style="width: 100%;">
                    ➕ Tambah Transaksi
                </button>
            </div>
        `;
    }

    return div;
}

function screenTransactions() {
    const div = document.createElement('div');
    div.className = 'screen';

    const header = document.createElement('div');
    header.className = 'header-with-logout';
    header.innerHTML = `
        <h2 style="margin: 0; font-size: 20px;">Riwayat Transaksi</h2>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    `;
    div.appendChild(header);

    if (transactions.length === 0) {
        div.innerHTML += `<p class="muted">Belum ada transaksi</p>`;
    } else {
        transactions.forEach(t => {
            const typeClass = t[2] === 'income' ? 'income' : 'expense';
            div.innerHTML += `
                <div class="row">
                    <div>
                        <strong>${t[5]}</strong>
                        <br><span class="muted">${t[6]}</span>
                    </div>
                    <span class="${typeClass}">Rp${t[4].toLocaleString()}</span>
                </div>
            `;
        });
    }

    if (session.role === 'accountant') {
        div.innerHTML += `
            <div style="margin-top: 20px;">
                <button class="btn" onclick="show('add_transaction')" style="width: 100%;">
                    ➕ Tambah Transaksi
                </button>
            </div>
        `;
    }

    return div;
}

function screenAddTransaction() {
    const div = document.createElement('div');
    div.className = 'screen';

    if (session.role !== 'accountant') {
        div.innerHTML = `<p class="muted">Anda tidak memiliki akses untuk menambah transaksi</p>`;
        return div;
    }

    div.innerHTML = `
        <h2 style="margin: 0 0 14px; font-size: 20px;">Tambah Transaksi</h2>
        
        <div class="field">
            <label>Tipe</label>
            <select id="typeSelect">
                <option value="income">Pemasukan</option>
                <option value="expense">Pengeluaran</option>
            </select>
        </div>
        
        <div class="field">
            <label>Kategori</label>
            <select id="categorySelect">
                ${categories.map(c => `<option value="${c[0]}">${c[1]}</option>`).join('')}
            </select>
        </div>
        
        <div class="field">
            <label>Jumlah (Rp)</label>
            <input type="number" id="amountInput" placeholder="0">
        </div>
        
        <div class="field">
            <label>Deskripsi</label>
            <textarea id="descInput" placeholder="Catatan transaksi..."></textarea>
        </div>
        
        <button class="btn" onclick="handleAddTransaction()" style="width: 100%;">Simpan</button>
        <button class="btn secondary" onclick="show('dashboard')" style="width: 100%; margin-top: 10px;">Batal</button>
    `;
    return div;
}

function handleAddTransaction() {
    if (session.role !== 'accountant') {
        alert('Anda tidak memiliki akses');
        return;
    }

    const type = document.getElementById('typeSelect').value;
    const category = document.getElementById('categorySelect').value;
    const amount = parseFloat(document.getElementById('amountInput').value);
    const desc = document.getElementById('descInput').value;

    if (!amount || amount <= 0) {
        alert('Jumlah harus lebih dari 0');
        return;
    }

    db.run(
        `INSERT INTO transactions (business_id, type, category_id, amount, description, transaction_date, created_by, created_at) VALUES (1, ?, ?, ?, ?, ?, ?, ?)`,
        [type, 1, amount, desc, new Date().toLocaleDateString('id-ID'), session.id, new Date().toISOString()]
    );
    saveDB();
    alert('Transaksi berhasil ditambahkan');
    loadData();
    show('transactions');
}

function screenProfile() {
    const div = document.createElement('div');
    div.className = 'screen';

    const header = document.createElement('div');
    header.className = 'header-with-logout';
    header.innerHTML = `
        <h2 style="margin: 0; font-size: 20px;">Profil</h2>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    `;
    div.appendChild(header);

    div.innerHTML += `
        <div class="card">
            <div class="avatar" style="width: 60px; height: 60px; font-size: 28px; margin-bottom: 12px;">
                ${session.name.charAt(0).toUpperCase()}
            </div>
            <strong style="font-size: 18px;">${session.name}</strong>
            <p class="muted">${session.email}</p>
            
            <div class="row" style="margin-top: 14px;">
                <span>Role:</span>
                <strong>${session.role === 'owner' ? 'Pemilik PT' : session.role === 'accountant' ? 'Akuntan' : session.role === 'mentor' ? 'Pendamping' : session.role}</strong>
            </div>
            
            <button class="btn danger" onclick="logout()" style="width: 100%; margin-top: 14px;">🚪 Logout</button>
        </div>
    `;

    return div;
}

// ==================== NAVIGATION ====================
function renderNav() {
    const body = document.getElementById('body').parentElement;
    if (body.querySelector('.nav')) body.querySelector('.nav').remove();

    if (!session) return;

    const nav = document.createElement('nav');
    nav.className = 'nav';

    const navItems = [
        { name: 'Dashboard', icon: '📊', screen: 'dashboard' },
        { name: 'Transaksi', icon: '📝', screen: 'transactions' },
        { name: 'Profil', icon: '👤', screen: 'profile' }
    ];

    navItems.forEach(item => {
        const btn = document.createElement('button');
        btn.className = active === item.screen ? 'active' : '';
        btn.onclick = () => show(item.screen);
        btn.innerHTML = `<span class="icon">${item.icon}</span><span>${item.name}</span>`;
        nav.appendChild(btn);
    });

    body.appendChild(nav);
}

// ==================== MAIN ====================
document.addEventListener('DOMContentLoaded', async () => {
    await initDB();
    loadData();

    document.getElementById('clock').textContent = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }, 1000);

    render();
    renderNav();

    window.addEventListener('hashchange', () => {
        active = location.hash.replace('#/', '') || 'dashboard';
        render();
        renderNav();
    });
});
    </script>
</body>
