<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>ADMINISTRASI KEUANGAN Financial Health Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <style>
        :root {
            --bg-app: #f6f9ff;
            --surface: #fff;
            --soft: #edf5ff;
            --text: #172033;
            --muted: #68758d;
            --border: #dce8f7;
            --blue: #2563eb;
            --blue2: #60a5fa;
            --green: #16a34a;
            --orange: #f59e0b;
            --red: #dc2626;
            --shadow-lg: 0 28px 80px rgba(0, 0, 0, .28)
        }

        * {
            box-sizing: border-box
        }

        html,
        body,
        #app {
            height: 100%
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 0, #24466f, #0f172a 42%, #050914);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
            overflow-x: hidden
        }

        button,
        input,
        select,
        textarea {
            font: inherit
        }

        button {
            border: 0;
            cursor: pointer
        }

        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        .app-container {
            aspect-ratio: 10/21;
            height: min(915px, calc(100vh - 40px));
            max-width: 440px;
            background: var(--bg-app);
            box-shadow: var(--shadow-lg), 0 0 0 12px #1e293b;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        .app-notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background: #1e293b;
            border-radius: 15px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .app-notch:after {
            content: '';
            width: 12px;
            height: 12px;
            background: #0f172a;
            border-radius: 50%;
            margin-left: 50px
        }

        .phone-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            padding: 4px 24px 0;
            height: 22px;
            background: var(--bg-app);
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            pointer-events: none
        }

        .status-bar-time {
            font-size: .65rem;
            font-weight: 800;
            color: #64748b
        }

        .app-body {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-top: 24px
        }

        .screen {
            min-height: 100%;
            padding: 18px 18px 92px;
            background: linear-gradient(180deg, #f8fbff, #edf5ff)
        }

        .login {
            min-height: 100%;
            display: grid;
            align-content: center;
            gap: 18px;
            padding: 28px;
            background: linear-gradient(160deg, #f8fbff, #e7f0ff)
        }

        .brand {
            width: 70px;
            height: 70px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--blue), #22c55e);
            display: grid;
            place-items: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 16px 35px rgba(37, 99, 235, .28)
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: .13em;
            text-transform: uppercase;
            font-weight: 900;
            color: var(--blue);
            margin: 0 0 8px
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45
        }

        .card {
            background: rgba(255, 255, 255, .92);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(31, 69, 116, .08)
        }

        .hero {
            background: linear-gradient(135deg, #12316b, var(--blue) 58%, #8bc5ff);
            color: white;
            border-radius: 30px;
            padding: 22px;
            box-shadow: 0 16px 38px rgba(37, 99, 235, .22);
            position: relative;
            overflow: hidden
        }

        .hero:after {
            content: '';
            position: absolute;
            right: -60px;
            top: -55px;
            width: 165px;
            height: 165px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .18)
        }

        .hero h1 {
            font-size: 26px;
            line-height: 1.07;
            margin: 10px 0 8px
        }

        .hero p {
            font-size: 13px;
            line-height: 1.45;
            margin: 0;
            opacity: .9
        }

        .chip {
            display: inline-flex;
            border-radius: 999px;
            padding: 7px 10px;
            background: #eaf2ff;
            color: #1d4ed8;
            font-size: 11px;
            font-weight: 900
        }

        .hero .chip {
            background: rgba(255, 255, 255, .18);
            color: #fff
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0
        }

        .label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800
        }

        .value {
            font-size: 23px;
            font-weight: 950;
            margin-top: 4px
        }

        .top-row,
        .section-title,
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px
        }

        .top-row {
            margin-bottom: 14px
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(135deg, #eaf2ff, #bbf7d0);
            display: grid;
            place-items: center;
            font-weight: 950;
            color: #164073
        }

        .section-title {
            margin: 20px 2px 10px
        }

        .section-title h2 {
            font-size: 18px;
            margin: 0
        }

        .row {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 10px
        }

        .row strong {
            font-size: 14px
        }

        .btn {
            border-radius: 16px;
            background: var(--blue);
            color: white;
            padding: 12px 14px;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(37, 99, 235, .25)
        }

        .btn.secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none
        }

        .btn.danger {
            background: #fff1f2;
            color: var(--red);
            box-shadow: none
        }

        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 10px
        }

        .field label {
            font-size: 12px;
            font-weight: 900;
            color: var(--muted)
        }

        .field input,
        .field select,
        .field textarea {
            border: 1px solid var(--border);
            background: white;
            border-radius: 16px;
            padding: 12px;
            outline: none
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12)
        }

        .status {
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 11px;
            font-weight: 900
        }

        .good {
            background: #dcfce7;
            color: #15803d
        }

        .warn {
            background: #fef3c7;
            color: #b45309
        }

        .bad {
            background: #fee2e2;
            color: #b91c1c
        }

        .income {
            color: var(--green)
        }

        .expense {
            color: var(--red)
        }

        .nav {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 14px;
            background: rgba(255, 255, 255, .94);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            box-shadow: 0 15px 35px rgba(31, 69, 116, .16);
            z-index: 50
        }

        .nav button {
            background: transparent;
            border-radius: 18px;
            padding: 9px 3px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px
        }

        .nav button.active {
            background: #eaf2ff;
            color: var(--blue)
        }

        .icon {
            font-size: 18px
        }

        .toast {
            position: absolute;
            top: 54px;
            left: 18px;
            right: 18px;
            z-index: 1001;
            background: #0f1b33;
            color: white;
            border-radius: 18px;
            padding: 12px 14px;
            font-size: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .24)
        }

        .photo {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            object-fit: cover;
            background: #eef5ff
        }

        .analysis {
            font-size: 12px;
            line-height: 1.55;
            color: var(--muted)
        }

        .analysis b {
            color: var(--text)
        }

        .progress {
            height: 10px;
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden
        }

        .bar {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--green));
            border-radius: 999px
        }

        @media(max-width:500px) {
            body {
                background: var(--bg-app)
            }

            #app {
                min-height: 100dvh;
                align-items: flex-start;
                justify-content: flex-start
            }

            .app-container {
                max-width: 100% !important;
                width: 100% !important;
                height: 100dvh !important;
                aspect-ratio: unset !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                padding-top: env(safe-area-inset-top, 0)
            }

            .app-notch,
            .phone-status-bar {
                display: none !important
            }

            .app-body {
                padding-top: 8px !important
            }

            .nav {
                position: fixed
            }

            .screen {
                min-height: 100dvh
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="app-container">
            <div class="app-notch"></div>
            <div class="phone-status-bar"><span class="status-bar-time" id="clock"></span></div>
            <main class="app-body" id="body"></main>
        </div>
    </div>
    <script>const DB_KEY = 'administrasi_keuangan_sqlite_v1'; let SQL, db, session = null, active = location.hash.replace('#/', '') || 'dashboard', users = [], businesses = [], transactions = [],[...]</script>

    <script>
    // ---- tambahan utilitas ----
    function toast(msg, timeout = 3000) {
      const existing = document.getElementById('app-toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.id = 'app-toast';
      t.className = 'toast';
      t.textContent = msg;
      document.querySelector('.app-container').appendChild(t);
      setTimeout(() => t.remove(), timeout);
    }

    function logout() {
      try {
        localStorage.removeItem('session');
        localStorage.removeItem('currentUser');
        session = null;
      } catch(e) {
        console.warn('logout cleanup error', e);
      }
      location.href = 'index.html';
    }

    function isAccountant() {
      return session && (session.role === 'accountant' || session.role === 'admin');
    }

    function isOwner() {
      return session && session.role === 'owner';
    }

    // render header kecil dengan nama user + logout
    function renderHeaderSmall() {
      const body = document.getElementById('body');
      let hdr = document.getElementById('small-header');
      if (!hdr) {
        hdr = document.createElement('div');
        hdr.id = 'small-header';
        hdr.className = 'top-row';
        hdr.style.padding = '10px 18px';
        hdr.style.gap = '10px';
        hdr.style.alignItems = 'center';
        body.prepend(hdr);
      }
      hdr.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar">${session ? (session.name||session.email||session.role[0]) : 'U'}</div>
          <div style="display:flex;flex-direction:column;align-items:flex-start">
            <div style="font-weight:900">${session ? (session.name || session.email) : 'Tamu'}</div>
            <div style="font-size:12px;color:var(--muted)">${session ? session.role : ''}</div>
          </div>
        </div>
        <div style="margin-left:auto">
          <button class="btn secondary" onclick="logout()" title="Logout">Logout</button>
        </div>
      `;
    }

    // Render tombol tambah transaksi (hanya untuk akuntan/admin)
    function renderAddTransactionControl(container) {
      if (!isAccountant()) return;
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = 'Tambah Transaksi';
      btn.onclick = () => showTransactionForm();
      container.appendChild(btn);
    }

    function showTransactionForm(tx = null) {
      const modal = document.createElement('div');
      modal.style.position = 'fixed';
      modal.style.left = '0';
      modal.style.top = '0';
      modal.style.right = '0';
      modal.style.bottom = '0';
      modal.style.display = 'grid';
      modal.style.placeItems = 'center';
      modal.style.background = 'rgba(0,0,0,0.4)';
      modal.innerHTML = `
        <div style="width:92%;max-width:420px;background:#fff;border-radius:16px;padding:18px">
          <h3 style="margin:0 0 10px">Form Transaksi</h3>
          <div class="field">
            <label>Tipe</label>
            <select id="tx-type">
              <option value="income">Pemasukan</option>
              <option value="expense">Pengeluaran</option>
            </select>
          </div>
          <div class="field">
            <label>Nominal</label>
            <input id="tx-amount" type="number" min="0" placeholder="0" />
          </div>
          <div class="field">
            <label>Kategori</label>
            <input id="tx-category" type="text" placeholder="Contoh: Penjualan, Beli Bahan" />
          </div>
          <div class="field">
            <label>Deskripsi</label>
            <input id="tx-desc" type="text" placeholder="Keterangan (opsional)" />
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
            <button class="btn secondary" id="tx-cancel">Batal</button>
            <button class="btn" id="tx-save">Simpan</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('tx-cancel').onclick = () => modal.remove();
      document.getElementById('tx-save').onclick = () => {
        const type = document.getElementById('tx-type').value;
        const amount = Number(document.getElementById('tx-amount').value || 0);
        const category = document.getElementById('tx-category').value.trim();
        const description = document.getElementById('tx-desc').value.trim();
        if (!amount || amount <= 0) { toast('Masukkan nominal yang valid'); return; }
        saveTransaction({
          type, amount, category, description,
          transaction_date: new Date().toISOString(),
          created_by: session ? session.email || session.id : 'unknown'
        });
        modal.remove();
      };
    }

    function saveTransaction(tx) {
      if (isOwner()) {
        toast('Aksi ditolak — Pemilik PT hanya dapat memantau.');
        return;
      }
      tx.id = 't_' + Date.now();
      transactions = transactions || [];
      transactions.push(tx);
      try {
        localStorage.setItem('transactions', JSON.stringify(transactions));
      } catch (e) {
        console.warn('simpan transaksi gagal', e);
      }
      toast('Transaksi tersimpan');
      if (typeof renderTransactions === 'function') renderTransactions();
    }

    // Jika aplikasi melakukan inisialisasi UI setelah load, coba render header
    document.addEventListener('DOMContentLoaded', () => {
      // Muat session dari localStorage jika ada
      try {
        const s = localStorage.getItem('session') || localStorage.getItem('currentUser') || null;
        if (s) session = JSON.parse(s);
      } catch(e) { session = session; }
      // render header jika body sudah tersedia
      if (document.getElementById('body')) renderHeaderSmall();
    });
    </script>
</body>

</html>
